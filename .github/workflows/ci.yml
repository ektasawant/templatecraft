name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    name: Install → Lint → Test
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 1. Checkout repository
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # 2. Setup Node.js (Next.js requires 18+)
      # -------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      # -------------------------------
      # 3. Install dependencies
      # -------------------------------
      - name: Install dependencies
        run: npm ci

      # -------------------------------
      # 4. Run ESLint
      # -------------------------------
      - name: Run ESLint
        run: npm run lint

      # -------------------------------
      # 5. Run Jest Tests
      # -------------------------------
      - name: Run tests
        run: npm test -- --ci --runInBand
